<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WanderWhimsy Pro</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
<a href="#" class="logo">WanderWhimsy+</a>
<input type="text" id="search" placeholder="Search location & hit Enter...">
</nav>

<header class="hero">
<h1>Global Curated Escapes</h1>
<p>Discover luxury destinations</p>
</header>

<div class="container">
<div class="grid" id="grid"></div>
</div>

<div class="booking-form">
<h2>Book Your Trip</h2>
<form id="bookForm">
<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email" required>
<select id="destSelect"></select>
<input type="date" id="sDate" required>
<input type="date" id="eDate" required>
<button type="submit">Book Now</button>
</form>
</div>

<div id="success-popup">✅ Successful Booking</div>

<script src="js/script.js"></script>
</body>
</html>
